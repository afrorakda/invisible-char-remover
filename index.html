<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Invisible Char Remover - Fridge Combo</title>
    <style>
        :root {
            --main: #333;
            --bg: #fff;
            --accent: #fafafa;
            --radius: 15px;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
        }

        main {
            flex: 1;
            width: 100%;
            max-width: 500px;
            padding: 20px;
            box-sizing: border-box;
        }

        .input-area {
            position: relative;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 15px;
            border: 2px solid var(--main);
            border-radius: var(--radius);
            background-color: var(--accent);
            font-size: 16px;
            box-sizing: border-box;
            resize: none;
            outline: none;
            /* iOS Specific */
            -webkit-appearance: none;
            -webkit-text-fill-color: var(--main);
            opacity: 1 !important;
        }

        textarea::placeholder {
            color: #999;
        }

        .stats-card {
            background: var(--accent);
            border-radius: var(--radius);
            padding: 15px;
            margin-bottom: 20px;
            display: none; /* 初期は非表示 */
        }

        .stats-title {
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 10px;
            display: block;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            padding: 4px 0;
            border-bottom: 1px solid #eee;
        }

        .stat-item:last-child {
            border-bottom: none;
        }

        .btn-black {
            width: 100%;
            padding: 15px;
            background-color: var(--main);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-bottom: 10px;
        }

        .btn-black:active {
            opacity: 0.8;
        }

        /* Footer & Modal Styles */
        footer {
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: #666;
        }

        .support-links {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .kofi-button {
            background: #111;
            color: white;
            padding: 8px 16px;
            border-radius: var(--radius);
            text-decoration: none;
            font-size: 14px;
        }

        .modal-trigger {
            background: none;
            border: none;
            color: #666;
            text-decoration: underline;
            cursor: pointer;
            font-size: 12px;
        }
    </style>
</head>
<body>

<main>
    <div class="input-area">
        <textarea id="textInput" placeholder="Paste your text here..."></textarea>
    </div>

    <div id="statsCard" class="stats-card">
        <span class="stats-title">✨ Cleaned! Found invisible chars:</span>
        <div id="statsList"></div>
    </div>

    <button id="copyBtn" class="btn-black" style="display:none;">Copy Cleaned Text</button>

    <div class="support-links">
        <a href="https://ko-fi.com/afrorakda" class="kofi-button">☕️ buy me a coffee</a>
        <button class="modal-trigger" onclick="alert('To use this like an app:\n1. Open in Safari\n2. Tap Share\n3. Select Add to Home Screen')">Add to Home Screen</button>
    </div>
</main>

<footer>
    No login / No tracking / No ads / Browser only Privacy Policy / afrorakda © 2026
</footer>

<script>
    const input = document.getElementById('textInput');
    const statsCard = document.getElementById('statsCard');
    const statsList = document.getElementById('statsList');
    const copyBtn = document.getElementById('copyBtn');

    input.addEventListener('input', () => {
        const original = input.value;
        if (!original) {
            statsCard.style.display = 'none';
            copyBtn.style.display = 'none';
            return;
        }

        // Target Characters
        const targets = [
            { name: 'Full-width Space (全角)', regex: /\u3000/g },
            { name: 'Zero Width Space', regex: /\u200B/g },
            { name: 'Tab Character', regex: /\t/g },
            { name: 'Control Characters', regex: /[\u0000-\u001F\u007F-\u009F]/g }
        ];

        let cleaned = original;
        let findings = [];

        targets.forEach(t => {
            const count = (original.match(t.regex) || []).length;
            if (count > 0) {
                findings.push({ name: t.name, count: count });
                cleaned = cleaned.replace(t.regex, '');
            }
        });

        if (findings.length > 0) {
            input.value = cleaned;
            renderStats(findings);
            statsCard.style.display = 'block';
            copyBtn.style.display = 'block';
        } else if (original.length > 0) {
            // Nothing found but content exists
            statsCard.style.display = 'none';
            copyBtn.style.display = 'block';
        }
    });

    function renderStats(findings) {
        statsList.innerHTML = findings.map(f => `
            <div class="stat-item">
                <span>${f.name}</span>
                <span>${f.count}</span>
            </div>
        `).join('');
    }

    copyBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(input.value);
        const originalText = copyBtn.innerText;
        copyBtn.innerText = '✅ Copied!';
        setTimeout(() => copyBtn.innerText = originalText, 2000);
    });
</script>

</body>
</html>
