<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Invisible Eraser</title>
    
    <link rel="icon" href="image_42.png">
    <link rel="apple-touch-icon" href="image_42.png">

    <style>
        :root {
            --main: #333;
            --bg: #fff;
            --accent: #eee;
            --input-bg: #fafafa;
            --radius: 15px;
        }

        /* 憲法遵守: 角丸15px / iOS Safari対策 / 全域選択禁止 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }

        /* 入力エリアのみテキスト選択許可 */
        textarea { -webkit-user-select: text; user-select: text; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            padding: env(safe-area-inset-top, 20px) 20px env(safe-area-inset-bottom, 20px) 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: -1.2px; }

        .hub-link {
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--main);
            background: var(--accent);
            padding: 8px 14px;
            border-radius: var(--radius);
        }

        .subtitle { font-size: 0.9rem; color: #666; font-weight: 700; text-align: left; }

        .input-card {
            background: var(--input-bg);
            padding: 18px;
            border-radius: var(--radius);
            border: 2px solid var(--accent);
            position: relative;
        }

        .input-wrapper { position: relative; }

        textarea {
            width: 100%;
            height: 280px;
            padding: 15px;
            padding-right: 45px;
            border: 2px solid var(--accent);
            border-radius: var(--radius);
            background-color: #fff;
            font-size: 1rem;
            font-weight: 600;
            color: var(--main) !important;
            outline: none;
            resize: none;
            -webkit-appearance: none;
            -webkit-text-fill-color: var(--main) !important;
            opacity: 1 !important;
        }
        textarea::placeholder { color: #bbb !important; -webkit-text-fill-color: #bbb !important; opacity: 1 !important; }

        .clr-btn {
            position: absolute; top: 10px; right: 10px; width: 28px; height: 28px;
            background: #ccc; color: #fff; border-radius: 50%;
            display: none; align-items: center; justify-content: center;
            cursor: pointer; border: none; font-size: 16px; font-weight: bold; z-index: 5;
        }

        .action-btn {
            width: 100%;
            padding: 18px;
            background-color: var(--main);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            -webkit-text-fill-color: #fff;
        }
        .action-btn:active { transform: scale(0.98); }

        .stats-area {
            display: none;
            background: var(--input-bg);
            border-radius: var(--radius);
            padding: 18px;
            border: 2px solid var(--accent);
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .stats-title { font-size: 0.8rem; font-weight: 900; margin-bottom: 12px; color: #666; text-transform: uppercase; }
        .stat-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            font-weight: 700;
            padding: 8px 0;
            border-bottom: 1px solid var(--accent);
        }
        .stat-item:last-child { border-bottom: none; }

        .copy-btn {
            display: none;
            width: 100%;
            padding: 16px;
            background-color: var(--accent);
            color: var(--main);
            border: none;
            border-radius: var(--radius);
            font-size: 0.9rem;
            font-weight: 800;
            cursor: pointer;
            margin-top: 5px;
        }
        .copy-btn:active { transform: scale(0.98); }

        .footer-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 5px; }
        .kofi-btn {
            background: var(--main); color: #fff; text-decoration: none;
            padding: 16px; border-radius: var(--radius); text-align: center;
            font-weight: 900; font-size: 0.9rem; -webkit-text-fill-color: #fff;
        }
        .home-btn {
            background: var(--accent); color: var(--main); border: none;
            padding: 12px; border-radius: var(--radius); font-weight: 800; font-size: 0.8rem; cursor: pointer;
        }

        /* 鉄壁フッター（聖域） */
        footer { text-align: center; font-size: 0.75rem; color: #999; line-height: 1.6; font-weight: 700; margin-top: 15px; }
        footer a { color: inherit; text-decoration: underline; }

        #modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px);
        }
        .modal-content {
            background: #fff; width: 90%; max-width: 340px; padding: 35px;
            border-radius: var(--radius); text-align: left; position: relative;
        }
        .close-x { position: absolute; top: 15px; right: 20px; font-size: 24px; color: #ccc; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Invisible Eraser</h1>
        <a href="https://afrorakda.github.io/" class="hub-link">🏠 Hub</a>
    </header>
    <p class="subtitle">One-tap invisible character remover.</p>

    <div class="input-card">
        <div class="input-wrapper">
            <textarea id="text-input" placeholder="Paste your text here..." oninput="toggleClr()"></textarea>
            <button class="clr-btn" id="clrBtn" onclick="clearInput()">×</button>
        </div>
    </div>

    <button id="erase-btn" class="action-btn" onclick="eraseIt()">ERASE IT</button>

    <div id="stats-area" class="stats-area">
        <div class="stats-title">✨ Cleaned Results</div>
        <div id="stats-list"></div>
        <button id="copy-btn" class="copy-btn" onclick="copyCleaned()">COPY CLEANED TEXT</button>
    </div>

    <div class="footer-btns">
        <a id="kofi-link" href="https://ko-fi.com/afrorakda" target="_blank" class="kofi-btn">☕️ buy me a coffee</a>
        <button class="home-btn" onclick="showModal()">Add to Home Screen</button>
    </div>

    <footer>
        <span id="footer-text">No login / No tracking / No ads / Browser only</span><br>
        <a id="privacy-link" href="https://afrorakda.com/privacy/">Privacy Policy</a> / <span id="copyright">afrorakda © 2026</span>
    </footer>
</div>

<div id="modal" onclick="hideModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-x" onclick="hideModal()">×</span>
        <h3 id="modal-title" style="margin-bottom: 15px; font-weight: 900;">📱 Install</h3>
        <p id="modal-body" style="font-size: 0.9rem; line-height: 1.6; font-weight: 700;">
            🍏 <strong>iPhone:</strong><br>Share > Add to Home Screen<br><br>
            🤖 <strong>Android:</strong><br>Menu (⋮) > Add to Home Screen
        </p>
    </div>
</div>

<script>
    const input = document.getElementById('text-input');
    const clrBtn = document.getElementById('clrBtn');
    const statsArea = document.getElementById('stats-area');
    const statsList = document.getElementById('stats-list');
    const copyBtn = document.getElementById('copy-btn');

    function toggleClr() {
        clrBtn.style.display = input.value.length > 0 ? 'flex' : 'none';
    }

    function clearInput() {
        input.value = '';
        toggleClr();
        statsArea.style.display = 'none';
        copyBtn.style.display = 'none';
        input.focus();
    }

    // 外部参照に基づく削除対象リスト
    function eraseIt() {
        const original = input.value;
        if (!original) return;

        const targets = [
            { name: 'Full-width Space (全角)', regex: /\u3000/g },
            { name: 'Zero Width Space', regex: /\u200B/g },
            { name: 'Tab Character', regex: /\t/g },
            { name: 'Control Characters', regex: /[\u0000-\u001F\u007F-\u009F]/g }
        ];

        let cleaned = original;
        let findings = [];

        targets.forEach(t => {
            const matches = original.match(t.regex);
            if (matches) {
                findings.push({ name: t.name, count: matches.length });
                cleaned = cleaned.replace(t.regex, '');
            }
        });

        input.value = cleaned;

        if (findings.length > 0) {
            statsList.innerHTML = findings.map(f => `
                <div class="stat-item">
                    <span>${f.name}</span>
                    <span>${f.count}</span>
                </div>
            `).join('');
        } else {
            statsList.innerHTML = '<div class="stat-item">No invisible characters found.</div>';
        }

        statsArea.style.display = 'block';
        copyBtn.style.display = 'block';
        window.scrollTo({ top: statsArea.offsetTop - 20, behavior: 'smooth' });
    }

    async function copyCleaned() {
        try {
            await navigator.clipboard.writeText(input.value);
            const originalText = copyBtn.innerText;
            copyBtn.innerText = '✅ COPIED!';
            setTimeout(() => copyBtn.innerText = originalText, 1500);
        } catch (err) {}
    }

    function showModal() { document.getElementById('modal').style.display = 'flex'; }
    function hideModal() { document.getElementById('modal').style.display = 'none'; }

    // 鉄壁ロジック: 削除厳禁・聖域
    async function loadFooter() {
        try {
            const response = await fetch('footer.json');
            if (response.ok) {
                const data = await response.json();
                if (data.footerText) document.getElementById('footer-text').innerText = data.footerText;
                if (data.privacyLink) document.getElementById('privacy-link').href = data.privacyLink;
                if (data.copyright) document.getElementById('copyright').innerText = data.copyright;
                if (data.kofiText) document.getElementById('kofi-link').innerText = data.kofiText;
                if (data.modalTitle) document.getElementById('modal-title').innerText = data.modalTitle;
                if (data.modalBody) document.getElementById('modal-body').innerHTML = data.modalBody;
            }
        } catch (e) { console.log("Static footer active."); }
    }

    loadFooter();
</script>

</body>
</html>
